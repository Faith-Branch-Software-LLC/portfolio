service: faithbranch-website
image: sebastianneiswanger/faithbranch-website
registry:
  username: sebastianneiswanger
  password:
    - KAMAL_REGISTRY_PASSWORD

ssh:
  keys_only: true
  keys:
    - ~/.ssh/faithbranch_DO

builder:
  arch: amd64
  secrets:
    - ReSendKey
    - DATABASE_URL
    - NEXTAUTH_SECRET
    - NEXTAUTH_URL
    - BASECAMP_CLIENT_ID
    - BASECAMP_CLIENT_SECRET
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - ENCRYPTION_KEY
    - CRON_SECRET
    - CLOUDINARY_CLOUD_NAME
    - CLOUDINARY_API_KEY
    - CLOUDINARY_API_SECRET
